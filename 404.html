<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Página no encontrada · Byteploy</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0a0a0b">
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <style>
    * { box-sizing: border-box; }
    html { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #fff; background: #0a0a0b; padding: 24px; text-align: center;
      position: relative; overflow: hidden;
    }
    .bar { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #ffd21e; }
    .circuit {
      position: absolute; inset: auto -60px -80px auto; width: 420px; height: 420px;
      background: url("assets/circuit.svg") no-repeat center / contain; opacity: 0.14; pointer-events: none;
    }
    main { position: relative; z-index: 1; }
    .logo { height: 68px; width: auto; margin-bottom: 26px; }
    .term {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 0.95rem;
      color: #a3a3ab; background: #0d0d10; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 16px 22px; display: inline-block; margin-bottom: 26px; text-align: left;
    }
    .term .p { color: #ffd21e; }
    .err { color: #ffd21e; }
    h1 { font-size: clamp(2rem, 6vw, 3rem); margin: 0 0 10px; letter-spacing: -0.02em; }
    p { color: #a3a3ab; margin: 0 0 26px; }
    a.btn {
      display: inline-block; padding: 13px 26px; border-radius: 999px; font-weight: 700;
      color: #0a0a0b; background: #ffd21e; text-decoration: none; margin: 0 6px 10px;
    }
    a.alt { color: #ffd21e; text-decoration: none; font-size: 0.92rem; }
  </style>
</head>
<body>
  <div class="bar"></div>
  <div class="circuit"></div>
  <main>
    <img class="logo" src="assets/logo-icon-light.png" alt="Byteploy">
    <div class="term"><span class="p">$</span> byteploy get /esta-pagina<br><span class="err">× 404 — not found</span></div>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o cambió de lugar. / The page you’re looking for doesn’t exist.</p>
    <p>
      <a class="btn" href="/">Ir al inicio</a>
    </p>
    <p><a class="alt" href="/en/" hreflang="en" lang="en">English version →</a></p>
  </main>
</body>
</html>
