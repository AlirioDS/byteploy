<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Página no encontrada · Byteploy</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#070b14">
  <style>
    * { box-sizing: border-box; }
    html { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #e6edf6;
      background-color: #070b14;
      background-image:
        radial-gradient(900px 480px at 80% -10%, rgba(129, 140, 248, 0.14), transparent 60%),
        radial-gradient(700px 420px at -10% 20%, rgba(34, 211, 238, 0.1), transparent 55%);
      padding: 24px;
      text-align: center;
    }
    .term {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.95rem;
      color: #a3b3ca;
      background: #0a0f1d;
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 12px;
      padding: 18px 24px;
      display: inline-block;
      margin-bottom: 28px;
      text-align: left;
    }
    .err { color: #f87171; }
    h1 { font-size: clamp(2rem, 6vw, 3rem); margin: 0 0 10px; letter-spacing: -0.02em; }
    p { color: #a3b3ca; margin: 0 0 26px; }
    a.btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: 650;
      color: #06101c;
      background: linear-gradient(100deg, #22d3ee, #818cf8 55%, #c084fc);
      text-decoration: none;
      margin: 0 6px 10px;
    }
    a.alt { color: #22d3ee; text-decoration: none; font-size: 0.92rem; }
  </style>
</head>
<body>
  <main>
    <div class="term">$ byteploy get /esta-pagina<br><span class="err">× 404 — not found</span></div>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o cambió de lugar. / The page you’re looking for doesn’t exist.</p>
    <p>
      <a class="btn" href="/">Ir al inicio</a>
    </p>
    <p><a class="alt" href="/en/" hreflang="en" lang="en">English version →</a></p>
  </main>
</body>
</html>
