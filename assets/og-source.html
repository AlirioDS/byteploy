<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>og-source (1200×630)</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden; position: relative;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: #fff; background: #0a0a0b;
    display: flex; flex-direction: column; padding: 62px 84px;
  }
  .bar { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: #ffd21e; }
  .circuit {
    position: absolute; top: -60px; right: -70px; width: 560px; height: 560px;
    background: url("circuit.svg") no-repeat center / contain; opacity: 0.18;
  }
  .top { display: flex; align-items: center; gap: 26px; }
  .top img.icon { height: 128px; width: auto; }
  .top img.word { height: 66px; width: auto; }
  .main { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .tagline { font-size: 62px; font-weight: 800; letter-spacing: -0.02em; }
  .hl { background: #ffd21e; color: #0a0a0b; padding: 0 14px; border-radius: 8px; }
  .sub { font-size: 29px; color: #a3a3ab; margin-top: 20px; }
  .foot { display: flex; justify-content: space-between; align-items: baseline; font-size: 26px; color: #a3a3ab; }
  .foot .url { color: #ffd21e; font-weight: 650; }
</style>
</head>
<body>
  <div class="bar"></div>
  <div class="circuit"></div>
  <div class="top">
    <img class="icon" src="logo-icon-light.png" alt="">
    <img class="word" src="wordmark-light.png" alt="">
  </div>
  <div class="main">
    <div class="tagline">Despliega tu <span class="hl">proyecto</span></div>
    <div class="sub">Software a medida · Custom software — from Chile to the world</div>
  </div>
  <div class="foot">
    <span class="url">byteploy.com</span>
    <span>Chile 🇨🇱 → 🌎</span>
  </div>
</body>
</html>
