<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>og-source (1200×630)</title>
<style>
  @font-face {
    font-family: "Manrope"; font-style: normal; font-weight: 200 800;
    src: url("fonts/manrope-variable.woff2") format("woff2");
  }
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden; position: relative;
    font-family: "Manrope", system-ui, sans-serif; color: #f6f4ef; background: #0e0e10;
    display: flex; flex-direction: column; padding: 62px 84px;
  }
  .bar { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: #ffd21f; }
  .circuit { position: absolute; top: -60px; right: -70px; width: 560px; height: 560px; background: url("circuit.svg") no-repeat center / contain; opacity: 0.2; }
  .top { display: flex; align-items: center; gap: 26px; }
  .top img.word { height: 92px; width: auto; }
  .main { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .tagline { font-size: 64px; font-weight: 800; letter-spacing: -0.03em; }
  .hl { background: #ffd21f; color: #0e0e10; padding: 0 14px; border-radius: 8px; }
  .sub { font-size: 29px; font-weight: 500; color: #a8a49b; margin-top: 20px; }
  .foot { display: flex; justify-content: space-between; align-items: baseline; font-size: 26px; font-weight: 500; color: #a8a49b; }
  .foot .url { color: #ffd21f; font-weight: 700; }
</style>
</head>
<body>
  <div class="bar"></div>
  <div class="circuit"></div>
  <div class="top">
    <img class="word" src="wordmark-light.png" alt="">
  </div>
  <div class="main">
    <div class="tagline">Despliega tu <span class="hl">empresa</span></div>
    <div class="sub">Software a medida · Custom software — from Chile to the world</div>
  </div>
  <div class="foot">
    <span class="url">byteploy.com</span>
    <span>Chile 🇨🇱 → 🌎</span>
  </div>
</body>
</html>
